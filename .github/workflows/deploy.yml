name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Notion 의 변경 사항을 정기적으로 반영하기 위해 30분마다 빌드 (필요 시 조정)
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (next export)
        env:
          # notion-client(비공식 API)를 사용하므로 NOTION_TOKEN 은 필요 없습니다.
          # 노션 DB 페이지가 "웹에 게시(Share to web)" 되어 있으면 빌드 시 자동으로 가져옵니다.
          GITHUB_PAGES: "true"
          # 프로젝트 페이지 배포 시 configure-pages 가 basePath 를 계산합니다.
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          pnpm build
          touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
